<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بيلا لخدمات الضيافة</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Tahoma", "Arial", sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background: #f5f1ec;
      color: #2f2a26;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid #eadfd6;
    }

    .header {
      background: linear-gradient(135deg, #4d3328 0%, #7a5a4b 100%);
      color: white;
      padding: 22px 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      padding: 8px;
      color: #6f4c3d;
      font-size: 34px;
      font-weight: bold;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-text {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sub-title {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 26px;
      background: #fff;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      color: #5b3b2e;
      margin: 8px 0 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 26px;
    }

    .field {
      background: #faf7f4;
      border: 1px solid #e7d9cf;
      border-radius: 16px;
      padding: 12px;
      min-width: 0;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #7b5b4e;
      margin-bottom: 8px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #d9c9bc;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      background: white;
      color: #2f2a26;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #8b6b5c;
      box-shadow: 0 0 0 3px rgba(139, 107, 92, 0.12);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #eadfd6;
      border-radius: 18px;
      margin-top: 10px;
      background: #fff;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    thead {
      background: #f4ece5;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eee4dc;
      text-align: center;
    }

    td input {
      width: 100%;
      min-width: 70px;
      padding: 10px 12px;
      border: 1px solid #dccdc1;
      border-radius: 10px;
      text-align: center;
    }

    .line-total {
      font-weight: bold;
      color: #5b3b2e;
    }

    .actions,
    .bottom-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #6f4c3d;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.95;
    }

    .btn-secondary {
      background: #efe5de;
      color: #5b3b2e;
    }

    .btn-danger {
      background: #b94b4b;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .summary-box {
      margin-top: 24px;
      display: flex;
      justify-content: flex-start;
    }

    .summary-card {
      min-width: 280px;
      background: #faf7f4;
      border: 1px solid #eadfd6;
      border-radius: 18px;
      padding: 18px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      color: #5b3b2e;
      gap: 16px;
    }

    .notes {
      margin-top: 24px;
    }

    .signatures-section {
      margin-top: 30px;
    }

    .signatures-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .signature-card {
      background: #faf7f4;
      border: 1px solid #eadfd6;
      border-radius: 18px;
      padding: 16px;
    }

    .signature-label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #7b5b4e;
      margin-bottom: 10px;
    }

    .signature-pad {
      width: 100%;
      height: 180px;
      background: #fff;
      border: 2px dashed #d8c7bb;
      border-radius: 14px;
      touch-action: none;
      display: block;
    }

    .signature-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: #8b776a;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .signatures-grid {
        grid-template-columns: 1fr;
      }
    }

@media (max-width: 640px) {
  body {
    padding: 0;
    background: #fff;
  }

  .container {
    max-width: 100%;
    margin: 0;
    border-radius: 0;
    box-shadow: none;
    border: none;
  }

  .header {
    padding: 12px 14px;
  }

  .brand {
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .logo {
    width: 54px;
    height: 54px;
    padding: 5px;
    border-radius: 12px;
  }

  .logo-text {
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .sub-title {
    font-size: 11px;
  }

  .content {
    padding: 10px;
  }

  .section-title {
    font-size: 16px;
    margin: 6px 0 10px;
  }

  .form-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }

  .field {
    padding: 8px;
    border-radius: 12px;
  }

  .field label {
    font-size: 11px;
    margin-bottom: 5px;
  }

  .field input,
  .field select,
  .field textarea {
    font-size: 13px;
    padding: 8px 9px;
    border-radius: 10px;
  }

  .table-wrap {
    margin-top: 6px;
    border-radius: 12px;
  }

  table {
    min-width: 620px;
  }

  th,
  td {
    padding: 8px 6px;
    font-size: 12px;
  }

  td input {
    padding: 7px 8px;
    font-size: 12px;
  }

  .actions,
  .bottom-actions {
    flex-direction: row;
    gap: 8px;
    justify-content: center;
  }

  .actions button,
  .bottom-actions button {
    width: auto;
    flex: 1 1 0;
    font-size: 13px;
    padding: 10px 12px;
  }

  .summary-box {
    margin-top: 14px;
  }

  .summary-card {
    width: 100%;
    min-width: 0;
    padding: 12px;
    border-radius: 14px;
  }

  .summary-row {
    font-size: 15px;
  }

  .notes {
    margin-top: 14px;
  }

  .signatures-section {
    margin-top: 18px;
  }

  .signatures-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .signature-card {
    padding: 10px;
    border-radius: 14px;
  }

  .signature-label {
    font-size: 12px;
    margin-bottom: 8px;
  }

  .signature-pad {
    height: 110px;
  }

  .signature-actions {
    flex-direction: row;
  }

  .signature-actions button {
    width: 100%;
    font-size: 12px;
    padding: 9px 10px;
  }

  .footer-note {
    font-size: 11px;
    margin-top: 12px;
  }
}

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .container {
        box-shadow: none;
        border: none;
        border-radius: 0;
        max-width: 100%;
      }

      .actions,
      .bottom-actions,
      .signature-actions {
        display: none !important;
      }

      .header {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo">
          <img src="logo-light.png" alt="Bella Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='B';">
        </div>
        <div>
          <div class="logo-text">بيلا لخدمات الضيافة</div>
          <div class="sub-title">نموذج تحرير طلب / عرض خدمات</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="section-title">البيانات الأساسية</div>

      <div class="form-grid">
        <div class="field">
          <label for="editorName">اسم المحرر</label>
          <input type="text" id="editorName" placeholder="اكتب اسم المحرر" />
        </div>

        <div class="field">
          <label for="phone">رقم الجوال</label>
          <input type="tel" id="phone" placeholder="05xxxxxxxx" />
        </div>

        <div class="field">
          <label for="releaseDate">تاريخ التحرير</label>
          <input type="date" id="releaseDate" />
        </div>

        <div class="field">
          <label for="department">القسم</label>
          <input type="text" id="department" placeholder="مثال: التشغيل" />
        </div>

        <div class="field">
          <label for="eventType">نوع الحفلة</label>
          <input type="text" id="eventType" placeholder="مثال: زواج / تخرج / استقبال" />
        </div>

        <div class="field">
          <label for="eventDay">يوم الحفلة</label>
          <select id="eventDay">
            <option value="">اختر اليوم</option>
            <option>الأحد</option>
            <option>الاثنين</option>
            <option>الثلاثاء</option>
            <option>الأربعاء</option>
            <option>الخميس</option>
            <option>الجمعة</option>
            <option>السبت</option>
          </select>
        </div>

        <div class="field">
          <label for="eventDate">تاريخ الحفلة</label>
          <input type="date" id="eventDate" />
        </div>
      </div>

      <div class="section-title">تفاصيل الطلب</div>

      <div class="table-wrap">
        <table id="itemsTable">
          <thead>
            <tr>
              <th style="width: 34%;">الصنف / الخدمة</th>
              <th style="width: 16%;">الكمية</th>
              <th style="width: 16%;">السعر</th>
              <th style="width: 18%;">الإجمالي</th>
              <th style="width: 16%;">حذف</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td><input type="text" class="item-name" placeholder="اكتب الصنف أو الخدمة" /></td>
              <td><input type="number" class="qty" min="0" step="1" value="1" /></td>
              <td><input type="number" class="price" min="0" step="0.01" value="0" /></td>
              <td class="line-total">0.00</td>
              <td><button type="button" class="btn-danger" onclick="removeRow(this)">حذف</button></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="actions">
        <button type="button" class="btn-primary" onclick="addRow()">إضافة سطر</button>
      </div>

      <div class="summary-box">
        <div class="summary-card">
          <div class="summary-row">
            <span>المجموع النهائي</span>
            <span id="grandTotal">0.00</span>
          </div>
        </div>
      </div>

      <div class="notes">
        <div class="field">
          <label for="notes">ملاحظات</label>
          <textarea id="notes" placeholder="أضف أي ملاحظات إضافية هنا..."></textarea>
        </div>
      </div>

      <div class="signatures-section">
        <div class="section-title">التوقيعات</div>

        <div class="signatures-grid">
          <div class="signature-card">
            <label class="signature-label">توقيع المحرر</label>
            <canvas id="editorSignature" class="signature-pad"></canvas>
            <div class="signature-actions">
              <button type="button" class="btn-secondary" onclick="clearSignature('editorSignature')">مسح التوقيع</button>
            </div>
          </div>

          <div class="signature-card">
            <label class="signature-label">توقيع المستلم</label>
            <canvas id="receiverSignature" class="signature-pad"></canvas>
            <div class="signature-actions">
              <button type="button" class="btn-secondary" onclick="clearSignature('receiverSignature')">مسح التوقيع</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-actions">
        <button type="button" class="btn-primary" onclick="window.print()">طباعة النموذج</button>
        <button type="button" class="btn-secondary" onclick="saveAsPDF()">حفظ PDF</button>
      </div>

      <div class="footer-note">
        تم إعداد هذا النموذج للاستخدام الداخلي والطباعة المباشرة
      </div>
    </div>
  </div>

  <script>
    function calculateTotals() {
      const rows = document.querySelectorAll("#tableBody tr");
      let grandTotal = 0;

      rows.forEach(row => {
        const qtyInput = row.querySelector(".qty");
        const priceInput = row.querySelector(".price");
        const lineTotalCell = row.querySelector(".line-total");

        const qty = parseFloat(qtyInput.value) || 0;
        const price = parseFloat(priceInput.value) || 0;
        const total = qty * price;

        lineTotalCell.textContent = total.toFixed(2);
        grandTotal += total;
      });

      document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
    }

    function addRow() {
      const tbody = document.getElementById("tableBody");
      const row = document.createElement("tr");

      row.innerHTML = `
        <td><input type="text" class="item-name" placeholder="اكتب الصنف أو الخدمة" /></td>
        <td><input type="number" class="qty" min="0" step="1" value="1" /></td>
        <td><input type="number" class="price" min="0" step="0.01" value="0" /></td>
        <td class="line-total">0.00</td>
        <td><button type="button" class="btn-danger" onclick="removeRow(this)">حذف</button></td>
      `;

      tbody.appendChild(row);
      attachEvents(row);
      calculateTotals();
    }

    function removeRow(button) {
      const rows = document.querySelectorAll("#tableBody tr");
      if (rows.length > 1) {
        button.closest("tr").remove();
        calculateTotals();
      } else {
        alert("لا يمكن حذف آخر سطر.");
      }
    }

    function attachEvents(scope = document) {
      const qtyInputs = scope.querySelectorAll(".qty");
      const priceInputs = scope.querySelectorAll(".price");

      qtyInputs.forEach(input => {
        input.removeEventListener("input", calculateTotals);
        input.addEventListener("input", calculateTotals);
      });

      priceInputs.forEach(input => {
        input.removeEventListener("input", calculateTotals);
        input.addEventListener("input", calculateTotals);
      });
    }

    const signaturePads = {};

    function setupSignaturePad(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#5b3b2e";
      }

      let drawing = false;
      let lastX = 0;
      let lastY = 0;

      function getPosition(e) {
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
          };
        }
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      function startDraw(e) {
        drawing = true;
        const pos = getPosition(e);
        lastX = pos.x;
        lastY = pos.y;
      }

      function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPosition(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastX = pos.x;
        lastY = pos.y;
      }

      function endDraw() {
        drawing = false;
      }

      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", draw);
      canvas.addEventListener("mouseup", endDraw);
      canvas.addEventListener("mouseleave", endDraw);

      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", draw, { passive: false });
      canvas.addEventListener("touchend", endDraw);

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      signaturePads[canvasId] = { canvas, ctx, resizeCanvas };
    }

    function clearSignature(canvasId) {
      const pad = signaturePads[canvasId];
      if (!pad) return;
      pad.ctx.clearRect(0, 0, pad.canvas.width, pad.canvas.height);
    }

    function saveAsPDF() {
      window.print();
    }

    document.getElementById("releaseDate").valueAsDate = new Date();

    attachEvents();
    calculateTotals();
    setupSignaturePad("editorSignature");
    setupSignaturePad("receiverSignature");
  </script>
</body>
</html>
