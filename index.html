<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بيلا لخدمات الضيافة</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Tahoma", "Arial", sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background: #f3efeb;
      color: #2f2a26;
      padding: 14px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
      border: 1px solid #eadfd6;
    }

    .header {
      background: linear-gradient(135deg, #4d3328 0%, #7a5a4b 100%);
      color: white;
      padding: 12px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      padding: 6px;
      color: #6f4c3d;
      font-size: 28px;
      font-weight: bold;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.2;
    }

    .sub-title {
      font-size: 12px;
      opacity: 0.95;
    }

    .content {
      padding: 14px;
      background: #fff;
    }

    .section-title {
      font-size: 17px;
      font-weight: bold;
      color: #5b3b2e;
      margin: 4px 0 10px;
      background: #efe5de;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .field {
      background: #faf7f4;
      border: 1px solid #e7d9cf;
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #7b5b4e;
      margin-bottom: 4px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #d9c9bc;
      border-radius: 9px;
      padding: 8px 9px;
      font-size: 12px;
      background: white;
      color: #2f2a26;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #8b6b5c;
      box-shadow: 0 0 0 2px rgba(139, 107, 92, 0.12);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #eadfd6;
      border-radius: 12px;
      margin-top: 6px;
      background: #fff;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead {
      background: #f4ece5;
    }

    th,
    td {
      padding: 8px 6px;
      border-bottom: 1px solid #eee4dc;
      text-align: center;
      font-size: 12px;
      vertical-align: middle;
    }

    td input {
      width: 100%;
      min-width: 60px;
      padding: 7px 8px;
      border: 1px solid #dccdc1;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
    }

    .actions,
    .bottom-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #6f4c3d;
      color: #fff;
    }

    .btn-secondary {
      background: #efe5de;
      color: #5b3b2e;
    }

    .summary-box {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
    }

    .summary-card {
      min-width: 220px;
      background: #faf7f4;
      border: 1px solid #eadfd6;
      border-radius: 12px;
      padding: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: bold;
      color: #5b3b2e;
      gap: 10px;
    }

    .notes {
      margin-top: 12px;
    }

    .notes .field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .signatures-section {
      margin-top: 14px;
    }

    .signatures-print {
      display: flex;
      justify-content: space-between;
      gap: 30px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .sign-box {
      flex: 1;
      min-width: 180px;
      text-align: center;
    }

    .sign-line {
      border-bottom: 1.5px solid #8f7b6f;
      height: 28px;
      margin-bottom: 5px;
    }

    .sign-label {
      font-size: 12px;
      color: #5b3b2e;
      font-weight: bold;
    }

    .footer-note {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #8b776a;
    }

    .print-hide-row,
    .print-hide-field {
      display: none !important;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 6px;
        background: #f3efeb;
      }

      .container {
        max-width: 100%;
        margin: 0;
        border-radius: 12px;
        box-shadow: none;
        border: none;
      }

      .header {
        padding: 10px 12px;
      }

      .brand {
        gap: 10px;
      }

      .logo {
        width: 52px;
        height: 52px;
        border-radius: 10px;
        padding: 5px;
      }

      .logo-text {
        font-size: 17px;
      }

      .sub-title {
        font-size: 10px;
      }

      .content {
        padding: 10px;
      }

      .section-title {
        font-size: 15px;
        margin: 4px 0 8px;
        padding: 7px 10px;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 10px;
      }

      .field {
        padding: 6px;
        border-radius: 10px;
      }

      .field label {
        font-size: 10px;
        margin-bottom: 3px;
      }

      .field input,
      .field select,
      .field textarea {
        font-size: 12px;
        padding: 7px 8px;
        border-radius: 8px;
      }

      table {
        min-width: 580px;
      }

      th,
      td {
        padding: 6px 5px;
        font-size: 11px;
      }

      td input {
        font-size: 11px;
        padding: 6px;
      }

      .actions,
      .bottom-actions {
        flex-direction: row;
        gap: 6px;
      }

      .actions button,
      .bottom-actions button {
        flex: 1 1 0;
        width: auto;
        font-size: 12px;
        padding: 9px 10px;
      }

      .summary-card {
        width: 100%;
        min-width: 0;
        padding: 10px;
      }

      .summary-row {
        font-size: 14px;
      }

      .signatures-print {
        gap: 14px;
      }

      .sign-box {
        min-width: 130px;
      }

      .sign-line {
        height: 22px;
      }

      .sign-label {
        font-size: 11px;
      }

      .footer-note {
        font-size: 10px;
      }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .container {
        box-shadow: none;
        border: none;
        border-radius: 0;
        max-width: 100%;
      }

      .actions,
      .bottom-actions,
      .footer-note {
        display: none !important;
      }

      .header {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sign-line {
        border-bottom: 1px solid #666;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo">
          <img src="logo-light.png" alt="Bella Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='B';">
        </div>
        <div>
          <div class="logo-text">بيلا لخدمات الضيافة</div>
          <div class="sub-title">نموذج تحرير طلب / عرض خدمات</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="section-title">البيانات الأساسية</div>

      <div class="form-grid">
        <div class="field">
          <label for="editorName">اسم المحرر</label>
          <input type="text" id="editorName" placeholder="اكتب اسم المحرر" />
        </div>

        <div class="field">
          <label for="phone">رقم الجوال</label>
          <input type="tel" id="phone" placeholder="05xxxxxxxx" />
        </div>

        <div class="field">
          <label for="releaseDate">تاريخ التحرير</label>
          <input type="date" id="releaseDate" />
        </div>

        <div class="field">
          <label for="department">القسم</label>
          <input type="text" id="department" placeholder="مثال: التشغيل" />
        </div>

        <div class="field">
          <label for="eventType">نوع الحفلة</label>
          <input type="text" id="eventType" placeholder="مثال: زواج / تخرج / استقبال" />
        </div>

        <div class="field">
          <label for="eventDay">يوم الحفلة</label>
          <select id="eventDay">
            <option value="">اختر اليوم</option>
            <option>الأحد</option>
            <option>الاثنين</option>
            <option>الثلاثاء</option>
            <option>الأربعاء</option>
            <option>الخميس</option>
            <option>الجمعة</option>
            <option>السبت</option>
          </select>
        </div>

        <div class="field">
          <label for="eventDate">تاريخ الحفلة</label>
          <input type="date" id="eventDate" />
        </div>
      </div>

      <div class="section-title">تفاصيل الطلب</div>

      <div class="table-wrap">
        <table id="itemsTable">
          <thead>
            <tr>
              <th style="width: 38%;">الصنف / الخدمة</th>
              <th style="width: 18%;">الكمية</th>
              <th style="width: 18%;">السعر</th>
              <th style="width: 26%;">ملاحظات</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td><input type="text" class="item-name" placeholder="اكتب الصنف أو الخدمة" /></td>
              <td><input type="number" class="qty" min="0" step="1" value="" /></td>
              <td><input type="number" class="price" min="0" step="0.01" value="" /></td>
              <td><input type="text" class="item-note" placeholder="ملاحظات" /></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="actions">
        <button type="button" class="btn-primary" onclick="addRow()">إضافة سطر</button>
      </div>

      <div class="summary-box">
        <div class="summary-card">
          <div class="summary-row">
            <span>المجموع النهائي</span>
            <span id="grandTotal">0.00</span>
          </div>
        </div>
      </div>

      <div class="notes">
        <div class="field">
          <label for="notes">ملاحظات عامة</label>
          <textarea id="notes" placeholder="أضف أي ملاحظات إضافية هنا..."></textarea>
        </div>
      </div>

      <div class="signatures-section">
        <div class="section-title">التوقيعات</div>
        <div class="signatures-print">
          <div class="sign-box">
            <div class="sign-line"></div>
            <div class="sign-label">توقيع المحرر</div>
          </div>

          <div class="sign-box">
            <div class="sign-line"></div>
            <div class="sign-label">توقيع المستلم</div>
          </div>
        </div>
      </div>

      <div class="bottom-actions">
        <button type="button" class="btn-primary" onclick="printForm()">طباعة النموذج</button>
        <button type="button" class="btn-secondary" onclick="saveAsPDF()">حفظ PDF</button>
      </div>

      <div class="footer-note">
        تم إعداد هذا النموذج للاستخدام الداخلي والطباعة المباشرة
      </div>
    </div>
  </div>

  <script>
    function calculateTotals() {
      const rows = document.querySelectorAll("#tableBody tr");
      let grandTotal = 0;

      rows.forEach(row => {
        const qtyInput = row.querySelector(".qty");
        const priceInput = row.querySelector(".price");

        const qty = parseFloat(qtyInput.value) || 0;
        const price = parseFloat(priceInput.value) || 0;

        grandTotal += qty * price;
      });

      document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
    }

    function addRow() {
      const tbody = document.getElementById("tableBody");
      const row = document.createElement("tr");

      row.innerHTML = `
        <td><input type="text" class="item-name" placeholder="اكتب الصنف أو الخدمة" /></td>
        <td><input type="number" class="qty" min="0" step="1" value="" /></td>
        <td><input type="number" class="price" min="0" step="0.01" value="" /></td>
        <td><input type="text" class="item-note" placeholder="ملاحظات" /></td>
      `;

      tbody.appendChild(row);
      attachEvents(row);
      calculateTotals();
    }

    function attachEvents(scope = document) {
      const qtyInputs = scope.querySelectorAll(".qty");
      const priceInputs = scope.querySelectorAll(".price");

      qtyInputs.forEach(input => {
        input.removeEventListener("input", calculateTotals);
        input.addEventListener("input", calculateTotals);
      });

      priceInputs.forEach(input => {
        input.removeEventListener("input", calculateTotals);
        input.addEventListener("input", calculateTotals);
      });
    }

    function beforePrintCleanup() {
      const rows = document.querySelectorAll("#tableBody tr");

      rows.forEach(row => {
        const item = row.querySelector(".item-name")?.value.trim() || "";
        const qty = row.querySelector(".qty")?.value.trim() || "";
        const price = row.querySelector(".price")?.value.trim() || "";
        const note = row.querySelector(".item-note")?.value.trim() || "";

        const isEmpty = !item && !qty && !price && !note;

        if (isEmpty) {
          row.classList.add("print-hide-row");
        } else {
          row.classList.remove("print-hide-row");
        }
      });

      document.querySelectorAll(".field").forEach(field => {
        const input = field.querySelector("input, select, textarea");
        if (!input) return;

        const value = input.value.trim();
        if (!value) {
          field.classList.add("print-hide-field");
        } else {
          field.classList.remove("print-hide-field");
        }
      });
    }

    function printForm() {
      beforePrintCleanup();
      window.print();
      setTimeout(() => {
        document.querySelectorAll(".print-hide-row").forEach(el => el.classList.remove("print-hide-row"));
        document.querySelectorAll(".print-hide-field").forEach(el => el.classList.remove("print-hide-field"));
      }, 500);
    }

    function saveAsPDF() {
      printForm();
    }

    document.getElementById("releaseDate").valueAsDate = new Date();

    attachEvents();
    calculateTotals();
  </script>
</body>
</html>
